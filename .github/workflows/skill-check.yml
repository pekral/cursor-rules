name: Skills Check

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  skill-check:
    name: "📋 skill-check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run skill-check
        uses: thedaviddias/skill-check@v1.2.0
        with:
          path: skills
          format: text
