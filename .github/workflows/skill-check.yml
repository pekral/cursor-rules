name: Skills Check

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  skill-check:
    name: "📋 skill-check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run skill-check
        run: npx skill-check@1.2.0 check skills --no-security-scan --format text
